<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Background -->
  <rect width="192" height="192" rx="40" fill="#002868"/>
  <!-- Red stripes -->
  <rect x="0" y="60" width="192" height="16" fill="#BF0A30" opacity="0.85"/>
  <rect x="0" y="92" width="192" height="16" fill="#BF0A30" opacity="0.85"/>
  <rect x="0" y="124" width="192" height="16" fill="#BF0A30" opacity="0.85"/>
  <!-- Navy canton -->
  <rect x="0" y="0" width="80" height="76" rx="40 0 0 0" fill="#002868"/>
  <!-- Gold stars (3x3 arrangement) -->
  <g fill="#FFD700" font-size="14" font-family="serif" text-anchor="middle">
    <!-- Row 1 -->
    <text x="18" y="24">★</text>
    <text x="40" y="24">★</text>
    <text x="62" y="24">★</text>
    <!-- Row 2 -->
    <text x="18" y="48">★</text>
    <text x="40" y="48">★</text>
    <text x="62" y="48">★</text>
    <!-- Row 3 -->
    <text x="18" y="72">★</text>
    <text x="40" y="72">★</text>
    <text x="62" y="72">★</text>
  </g>
  <!-- "CQ" text -->
  <text x="96" y="168" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="28" font-weight="900" fill="#FFD700" letter-spacing="2">CQ</text>
</svg>
