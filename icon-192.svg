<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Background -->
  <rect width="192" height="192" rx="40" fill="#002868"/>
  <!-- Flag stripes -->
  <rect x="20" y="30" width="152" height="10" fill="#BF0A30"/>
  <rect x="20" y="40" width="152" height="10" fill="#FFFFFF"/>
  <rect x="20" y="50" width="152" height="10" fill="#BF0A30"/>
  <rect x="20" y="60" width="152" height="10" fill="#FFFFFF"/>
  <rect x="20" y="70" width="152" height="10" fill="#BF0A30"/>
  <rect x="20" y="80" width="152" height="10" fill="#FFFFFF"/>
  <rect x="20" y="90" width="152" height="10" fill="#BF0A30"/>
  <!-- Navy canton -->
  <rect x="20" y="30" width="64" height="40" fill="#002868"/>
  <!-- Stars in canton -->
  <g fill="#FFFFFF" font-size="8" font-family="serif" text-anchor="middle">
    <text x="32" y="42">★</text><text x="44" y="42">★</text><text x="56" y="42">★</text><text x="68" y="42">★</text>
    <text x="38" y="52">★</text><text x="50" y="52">★</text><text x="62" y="52">★</text>
    <text x="32" y="62">★</text><text x="44" y="62">★</text><text x="56" y="62">★</text><text x="68" y="62">★</text>
  </g>
  <!-- "TEST" text -->
  <text x="96" y="148" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif"
        font-size="40" font-weight="900" fill="#FFD700" letter-spacing="4">TEST</text>
  <!-- Subtitle -->
  <text x="96" y="170" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif"
        font-size="12" font-weight="600" fill="rgba(255,255,255,0.6)" letter-spacing="3">U.S. CIVICS</text>
</svg>
